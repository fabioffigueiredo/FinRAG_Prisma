name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependências mínimas da API
        run: pip install fastapi uvicorn requests "pydantic==2.13.4" "numpy==1.26.4" faiss-cpu rank-bm25 pytest
      - name: Testes
        working-directory: services/prisma-api
        run: python -m pytest tests/ -v

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Instalar e checar tipos
        working-directory: apps/web
        run: |
          pnpm install --frozen-lockfile
          ./node_modules/.bin/tsc --noEmit
