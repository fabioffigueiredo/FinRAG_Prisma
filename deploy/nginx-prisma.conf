# Cole estes dois blocos DENTRO do server { } que já atende wiki.ioi.ia.br (HTTPS).
# Ordem importa: a location mais específica (/prisma/api/) vem antes.

# API do Prisma -> container FastAPI (remove o prefixo /prisma/api)
location /prisma/api/ {
    proxy_pass         http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 180s;            # geração de IA pode levar alguns segundos
}

# App Next.js (basePath=/prisma) -> container web (mantém o prefixo /prisma)
location /prisma {
    proxy_pass         http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;   # HMR/websocket (se houver)
    proxy_set_header   Connection        "upgrade";
}
