# Prisma — demo hospedada (IA de nuvem via Groq). Rodar da RAIZ do repo:
#   GROQ_API_KEY=xxx docker compose -f deploy/docker-compose.yml up -d --build
services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}      # chave da nuvem (free tier) — só no servidor
    ports:
      - "127.0.0.1:8000:8000"             # exposto só ao localhost; nginx faz o proxy
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        PRISMA_BASE_PATH: /prisma
        NEXT_PUBLIC_PRISMA_API: https://wiki.ioi.ia.br/prisma/api
        NEXT_PUBLIC_PRISMA_HOSTED: "1"
    ports:
      - "127.0.0.1:3100:3100"
    depends_on:
      - api
    restart: unless-stopped
